<svg width="400" height="280" viewBox="0 0 400 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="280" rx="20" fill="#F3FBF6"/>
  <g transform="translate(24,24)">
    <rect x="0" y="0" width="352" height="232" rx="12" fill="#FFFFFF" stroke="#DFF3E9"/>
    <!-- axes -->
    <line x1="16" y1="200" x2="328" y2="200" stroke="#E6F2EA" stroke-width="2"/>
    <line x1="16" y1="24" x2="16" y2="200" stroke="#E6F2EA" stroke-width="2"/>
    <!-- bars rising (upside graph) -->
    <rect x="40" y="140" width="28" height="60" rx="4" fill="#CFF3D8"/>
    <rect x="90" y="100" width="28" height="100" rx="4" fill="#9FE6B7"/>
    <rect x="140" y="72" width="28" height="128" rx="4" fill="#57D07F"/>
    <rect x="190" y="48" width="28" height="152" rx="4" fill="#36C06A"/>
    <rect x="240" y="28" width="28" height="172" rx="4" fill="#25A85A"/>
    <!-- trend line -->
    <polyline points="54,150 104,110 154,82 204,58 254,38" fill="none" stroke="#0F9C5F" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="54" cy="150" r="5" fill="#0F9C5F"/>
    <circle cx="104" cy="110" r="5" fill="#0F9C5F"/>
    <circle cx="154" cy="82" r="5" fill="#0F9C5F"/>
    <circle cx="204" cy="58" r="5" fill="#0F9C5F"/>
    <circle cx="254" cy="38" r="5" fill="#0F9C5F"/>
    <!-- title -->
    <text x="16" y="16" font-family="Inter, Arial, sans-serif" font-size="12" fill="#0F9C5F">Upside Growth</text>
  </g>
</svg>